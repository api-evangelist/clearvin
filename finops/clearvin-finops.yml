meters:
- name: reports
  description: Vehicle reports retrieved by VIN; each report consumes one credit / package unit.
  unit: reports
  aggregation: sum
  dimensions:
  - account
  - product
- name: credits_purchased
  description: Prepaid report credits purchased into the account balance.
  unit: credits
  aggregation: sum
  dimensions:
  - account
- name: credits_consumed
  description: Report credits spent against VIN lookups.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - product
- name: subscription_reports
  description: Reports drawn against a monthly unlimited / package subscription allotment.
  unit: reports
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track report pulls and credit burn against the account balance per product (decode, history, valuation).
- name: Allocation
  description: Tag report requests to teams / workflows; map credit spend to internal cost centers.
- name: Optimization
  description: Choose multi-packs, the unlimited subscription, or dealer pricing to lower per-report cost; deduplicate repeat VIN lookups; request only the report depth needed.
- name: Accountability
  description: Assign an owner for credit replenishment; review monthly report volume against budget.
