publisherName: ClearVIN
serviceCategory: Data and Analytics
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Prepaid
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
focusColumns:
  ServiceName: ClearVIN Vendor API
  ServiceCategory: Data and Analytics
  ProviderName: ClearVIN
  PublisherName: ClearVIN
  InvoiceIssuerName: ClearVIN
  BillingCurrency: USD
  ChargeCategory: Usage
