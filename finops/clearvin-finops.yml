description: >-
  FinOps view of ClearVIN spend. ClearVIN bills per vehicle report rather than
  per API call: each VIN lookup consumes one prepaid report credit / package
  unit drawn from the account balance, with consumer per-report, multi-pack,
  and unlimited-subscription tiers and discounted dealer / vendor bulk pricing.
  Credits do not expire. The primary cost driver is reports pulled; optimization
  centers on pack / subscription selection, deduplicating repeat VIN lookups,
  and matching report depth (decode vs. full history vs. valuation) to need.
notes: >-
  Vendor API pricing is quoted on signup and not publicly listed; per-report
  and subscription figures are representative public prices. Verify billing
  currency, invoicing cadence, and unit rates with ClearVIN on reconciliation.
sources:
- https://www.clearvin.com/en/api-subscribers/
- https://www.clearvin.com/en/dealer/pricing/
