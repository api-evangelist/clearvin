    type: PostmanCollection
  - url: collections/clearvin.opencollection.json
    type: OpenCollection
  description: Exchanges account email and password for a JWT bearer token (valid 120
    minutes) used to authorize report requests. Requests must originate from a registered
    IP address. Account credit balance is managed through the ClearVIN account and
    is not exposed via a separately documented public endpoint.
